name: CI

on:
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore FinanceTracker/FinanceTracker.sln

      - name: Build
        run: dotnet build FinanceTracker/FinanceTracker.sln --no-restore

      - name: Run tests
        run: dotnet test FinanceTracker/FinanceTracker.sln --no-build --verbosity normal